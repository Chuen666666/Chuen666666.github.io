name: Hexo Deploy

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: hexo-deployment-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Inspect build inputs
        run: |
          node --version
          npm --version
          npx hexo version
          pwd
          ls -la
          find source -maxdepth 2 -type f | sort | head -100
          echo "Post count:"
          find source/_posts -maxdepth 1 -type f -name '*.md' | wc -l
          echo "Page files:"
          find source/about source/links -maxdepth 2 -type f -print
          echo "Config excerpt:"
          sed -n '1,120p' _config.yml

      - name: Generate Files
        run: |
          npx hexo clean
          npx hexo generate

      - name: Verify generated site
        run: |
          required_files=(
            public/index.html
            public/about/index.html
            public/archives/index.html
            public/categories/index.html
            public/tags/index.html
            public/links/index.html
          )
          missing=0
          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "::error::Missing generated file: $file"
              missing=1
            fi
          done
          find public -type f | wc -l
          du -sh public
          find public -maxdepth 2 -type f | sort | head -100
          exit "$missing"

      - name: Add Pages marker
        run: touch public/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
